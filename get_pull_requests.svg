<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="421px" preserveAspectRatio="none" style="width:340px;height:421px;background:#FFFFFF;" version="1.1" viewBox="0 0 340 421" width="340px" zoomAndPan="magnify"><defs/><g><ellipse cx="170.1191" cy="20" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="230.9615" x="54.6383" y="50"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210.9615" x="64.6383" y="72.8281">Get all PRs from the org/author given</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="291.046" x="24.5961" y="106.3441"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="271.046" x="34.5961" y="129.1722">Get all jira issues from the given "top level filter"</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="223.2695" x="58.4843" y="162.6882"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="203.2695" x="68.4843" y="185.5163">Get all children of those main issues</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="317.0262" x="11.606" y="219.0323"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="297.0262" x="21.606" y="241.8604">Search the PR title and description for jira references</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="254.8297" x="42.7042" y="275.3765"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="234.8297" x="52.7042" y="298.2045">For every issue fe
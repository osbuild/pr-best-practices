<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="397px" preserveAspectRatio="none" style="width:355px;height:397px;background:#FFFFFF;" version="1.1" viewBox="0 0 355 397" width="355px" zoomAndPan="magnify"><defs/><g><ellipse cx="177.9011" cy="20" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="291.6339" x="32.0842" y="50"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="271.6339" x="42.0842" y="72.8281">Load data_collection from `get_pull_requests.py`</text><rect fill="#F1F1F1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="333.8022" x="11" y="106.3441"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="313.8022" x="21" y="129.1722">For every main issue, collect it's parents (better context)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="261.1459" x="21" y="145.5163">and use AI to write a summary for a developer</text><rect fill="#F1F1F1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="262.3898" x="46.7062" y="179.0323"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="242.3898" x="56.7062" y="201.8604">Compute embeddings for every main issue</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="201.0494" x="56.7062" y="218.2045">(original text + ai summary) for RAG</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="330.1062" x="12.848" y="251.7206"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="310.1062" x="22.848" y="274.5487">Select the top (default 5) issues that might match (RAG)</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="291.382" x="32.2101" y="308.0647"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="271.382" x="42.2101" y="330.8928">Ask AI to select matching jira issues out of those</text><ellipse cx="177.9011" cy="375.4088" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="177.9011" cy="375.4088" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="177.9011" x2="177.9011" y1="30" y2="50"/><polygon fill="#181818" points="173.9011,40,177.9011,50,181.9011,40,177.9011,44" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="177.9011" x2="177.9011" y1="86.3441" y2="106.3441"/><polygon fill="#181818" points="173.9011,96.3441,177.9011,106.3441,181.9011,96.3441,177.9011,100.3441" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="177.9011" x2="177.9011" y1="159.0323" y2="179.0323"/><polygon fill="#181818" points="173.9011,169.0323,177.9011,179.0323,181.9011,169.0323,177.9011,173.0323" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="177.9011" x2="177.9011" y1="231.7206" y2="251.7206"/><polygon fill="#181818" points="173.9011,241.7206,177.9011,251.7206,181.9011,241.7206,177.9011,245.7206" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="177.9011" x2="177.9011" y1="288.0647" y2="308.0647"/><polygon fill="#181818" points="173.9011,298.0647,177.9011,308.0647,181.9011,298.0647,177.9011,302.0647" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="177.9011" x2="177.9011" y1="344.4088" y2="364.4088"/><polygon fill="#181818" points="173.9011,354.4088,177.9011,364.4088,181.9011,354.4088,177.